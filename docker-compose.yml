services:
  # postgres — СУБД PostgreSQL 17 для хранения данных сервиса волонтёров
  postgres:
    image: postgres:17.10
    container_name: volunteer_service-postgres
    environment:
      POSTGRES_DB: volunteer_service
      POSTGRES_USER: volunteer_service
      POSTGRES_PASSWORD: volunteer_service
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - volunteer_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer_service -d volunteer_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # kafka — Брокер сообщений Apache Kafka 4.3 для событийной коммуникации между микросервисами
  kafka:
    image: apache/kafka:4.3.1
    container_name: volunteer_service-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "INTERNAL://:29092,CONTROLLER://:29093,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # schema-registry — Реестр Avro-схем Kafka-сообщений
  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.2
    container_name: volunteer_service-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"

  # kafka-ui — Веб-интерфейс для просмотра топиков, сообщений и состояния Kafka-кластера
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: volunteer_service-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: volunteer-service-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "${KAFKA_UI_PORT:-8092}:8080"

  # swagger-ui — Веб-интерфейс Swagger UI для просмотра и интерактивного тестирования OpenAPI-спецификации сервиса
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.7
    container_name: volunteer_service-swagger-ui
    environment:
      SWAGGER_JSON: /openapi/volunteer-api.yaml
    ports:
      - "${SWAGGER_UI_PORT:-8091}:8080"
    volumes:
      - ./target/openapi/volunteer-api.yaml:/openapi/volunteer-api.yaml:ro

volumes:
  volunteer_service_postgres_data:
