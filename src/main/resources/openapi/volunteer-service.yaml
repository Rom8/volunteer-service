openapi: 3.1.0
info:
  title: Volunteer Service API
  description: API сервиса регистрации и управления волонтёрами.
  version: 0.0.1
servers:
  - url: http://localhost:8080
tags:
  - name: Volunteer
    description: API волонтёра
  - name: AdminVolunteer
    description: Административный API волонтёров
  - name: InternalVolunteer
    description: Внутренний API волонтёров
paths:
  /api/v1/volunteer/register/me:
    post:
      tags:
        - Volunteer
      operationId: registerMe
      summary: Регистрация волонтёра
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolunteerRegisterRequest'
      responses:
        '201':
          description: Волонтёр зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolunteerDto'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/volunteer/me:
    get:
      tags:
        - Volunteer
      operationId: getMe
      summary: Просмотр данных о своей регистрации
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Данные волонтёра
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolunteerDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Volunteer
      operationId: updateMe
      summary: Обновление данных о себе
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolunteerUpdateRequest'
      responses:
        '200':
          description: Данные волонтёра обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolunteerDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Volunteer
      operationId: deleteMe
      summary: Удаление своей учётной записи волонтёра
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '204':
          description: Учётная запись удалена
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/admin/volunteer/{id}:
    get:
      tags:
        - AdminVolunteer
      operationId: getVolunteer
      summary: Получение данных волонтёра по идентификатору
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор волонтёра
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Данные волонтёра
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolunteerDto'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/admin/volunteer/list:
    get:
      tags:
        - AdminVolunteer
      operationId: getVolunteerList
      summary: Получение списка зарегистрированных волонтёров с фильтрацией
      parameters:
        - name: settlementName
          in: query
          required: false
          description: Населённый пункт
          schema:
            type: string
            maxLength: 255
        - name: settlementDistrictName
          in: query
          required: false
          description: Район населённого пункта
          schema:
            type: string
            maxLength: 255
        - name: status
          in: query
          required: false
          description: Статус волонтёра
          schema:
            $ref: '#/components/schemas/VolunteerStatus'
      responses:
        '200':
          description: Список волонтёров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VolunteerDto'
  /internal/api/v1/volunteer/list:
    post:
      tags:
        - InternalVolunteer
      operationId: getInternalVolunteerList
      summary: Получение контактных данных волонтёров по списку идентификаторов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
                minimum: 1
      responses:
        '200':
          description: Список волонтёров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VolunteerDto'
components:
  parameters:
    UserIdHeader:
      name: X-USER-ID
      in: header
      required: true
      description: Идентификатор пользователя
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Некорректный запрос
    NotFound:
      description: Волонтёр не найден
  schemas:
    VolunteerRegisterRequest:
      type: object
      required:
        - familyName
        - firstName
        - gender
        - phoneNumber
        - email
        - birthDate
        - settlementName
      properties:
        familyName:
          type: string
          maxLength: 100
        firstName:
          type: string
          maxLength: 100
        patronymic:
          type: string
          maxLength: 100
        gender:
          $ref: '#/components/schemas/Gender'
        phoneNumber:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        birthDate:
          type: string
          format: date
        settlementName:
          type: string
          maxLength: 255
        settlementDistrictName:
          type: string
          maxLength: 255
    VolunteerUpdateRequest:
      type: object
      properties:
        familyName:
          type: string
          maxLength: 100
        firstName:
          type: string
          maxLength: 100
        patronymic:
          type: string
          maxLength: 100
        phoneNumber:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        settlementName:
          type: string
          maxLength: 255
        settlementDistrictName:
          type: string
          maxLength: 255
    VolunteerDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        createDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        userId:
          type: string
        firstName:
          type: string
        familyName:
          type: string
        patronymic:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        birthDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/VolunteerStatus'
        locationId:
          type: integer
          format: int64
        currentIncidentId:
          type: string
          format: uuid
        contacts:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ContactInfoDto'
    ContactInfoDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        createDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        contact:
          type: string
        contactType:
          $ref: '#/components/schemas/ContactType'
        volunteerId:
          type: integer
          format: int64
    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
    VolunteerStatus:
      type: string
      enum:
        - FREE
        - ASSIGNED_TASK
    ContactType:
      type: string
      enum:
        - PHONE
        - EMAIL
